id: C-016
title: /analyze validates license_key against DynamoDB
source_commit: 24138dd
layer: server
trigger: |
  /analyze receives a request bearing a license_key header (or
  body field).
effect: |
  Middleware verifies the key against the licenses table. Missing
  or invalid → 401 Unauthorized.
boundary: |
  Expired licenses are accepted within a 7-day grace window (soft
  failure → metric increment + log). After grace → 401. Free-tier
  requests bypass this contract per a separate config flag.
