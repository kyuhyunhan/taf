id: C-005
title: /analyze responses are recorded to usage DynamoDB
source_commit: 3cff235
layer: server
trigger: |
  /analyze returns a successful (2xx) response.
effect: |
  A usage record (license_id, day, route, tokens) is written to the
  usage table for later aggregation.
boundary: |
  Write is best-effort: failure to persist the usage record must NOT
  fail the user-visible request. Usage data is eventually consistent.
