id: C-015
title: AccessibilityService returns the currently-selected text
source_commit: 1e56c38
layer: client
trigger: |
  Caller invokes AccessibilityService.selectedText() (e.g. on a
  ⌘C-triggered overlay).
effect: |
  Returns the text currently selected in the frontmost app via the
  AX API. Returns nil if no selection exists.
boundary: |
  Requires Accessibility permission. Missing permission throws
  AccessibilityError.permissionDenied — the caller is responsible
  for surfacing the permission prompt UI.
