id: C-004
title: build-release.sh quit/install/relaunch is atomic
source_commit: fbea6b7
layer: tooling
trigger: |
  Developer runs scripts/build-release.sh against a built .app bundle.
effect: |
  The script (a) quits the running Lexio instance, (b) replaces the
  installed .app, (c) relaunches it — and aborts cleanly without
  leaving a half-installed state if any step fails.
boundary: |
  Developer-workflow only. Not bundled with shipped product. Does
  not affect user-installed copies.
