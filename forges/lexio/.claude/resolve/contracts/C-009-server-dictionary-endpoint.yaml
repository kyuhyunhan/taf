id: C-009
title: /dictionary endpoint (legacy) returns dictionary entry via OpenAI
source_commit: c02051b
layer: server
status: deprecated
trigger: |
  Client (or external caller) issues POST /dictionary with a single
  term.
effect: |
  Server calls OpenAI dictionary prompt and returns part-of-speech,
  definitions, examples.
boundary: |
  Superseded by /analyze. Kept for back-compat. New clients SHOULD
  use /analyze.
